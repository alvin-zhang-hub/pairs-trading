<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Lighthouse Scanner</title>
  <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f1117; color: #e2e8f0; font-family: 'Work Sans', sans-serif; padding: 24px; }
    h2 { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; }
    details summary::-webkit-details-marker { display:none; }
    details[open] { border-color: #3b82f6; }
    a { color: #3b82f6; }
    code { font-family: 'SF Mono', monospace; font-size: 12px; }
  </style>
</head>
<body>
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;
              border-bottom:1px solid #1e293b;padding-bottom:16px">
    <div style="display:flex;align-items:baseline;gap:20px">
      <h2>Lighthouse Scanner</h2>
    </div>
  </div>

  <div style="display:flex;gap:24px;align-items:baseline;margin-bottom:20px"><div><span id="hit-count" style="font-size:32px;font-weight:700;color:#e2e8f0">0</span><span style="font-size:13px;color:#64748b;margin-left:8px">hits</span></div><div><span id="new-count" style="font-size:20px;font-weight:600;color:#22c55e">0</span><span style="font-size:13px;color:#64748b;margin-left:6px">new today</span></div><div style="margin-left:auto;font-size:12px;color:#64748b">Last scan: May 19, 2026 · 12:15 AM UTC</div></div>
  
    <form method="GET" action="/scanner" id="filter-form"
          onsubmit="event.preventDefault(); applyFilters();"
          style="background:#1e293b;padding:14px 18px;border-radius:10px;margin-bottom:20px;
                 display:flex;gap:16px;align-items:center;flex-wrap:wrap">
      <label style="font-size:12px;color:#64748b">Sector:
        <select name="sector" id="filter-sector" onchange="applyFilters()"
                style="margin-left:6px;background:#111827;color:#e2e8f0;
                       border:1px solid #334155;padding:6px 10px;border-radius:6px">
          <option value="">All</option>
          
        </select>
      </label>
      <label style="font-size:12px;color:#64748b">Theme:
        <select name="theme" id="filter-theme" onchange="applyFilters()"
                style="margin-left:6px;background:#111827;color:#e2e8f0;
                       border:1px solid #334155;padding:6px 10px;border-radius:6px">
          <option value="">All</option>
          
        </select>
      </label>
      <label style="font-size:12px;color:#e2e8f0;display:flex;align-items:center;gap:6px">
        <input type="checkbox" name="stage2_only" id="filter-stage2" value="1" 
               onchange="applyFilters()"> Stage 2 only
      </label>
      <label style="font-size:12px;color:#e2e8f0;display:flex;align-items:center;gap:6px">
        <input type="checkbox" name="new_only" id="filter-new" value="1" 
               onchange="applyFilters()"> New today only
      </label>
      <a href="#" onclick="resetFilters(); return false;"
         style="color:#64748b;text-decoration:none;font-size:12px">Reset</a>
    </form>
    
  <div style="text-align:center;padding:64px 24px;background:#111827;border-radius:10px"><div style="font-size:48px;color:#64748b">○</div><div style="margin-top:16px;font-size:18px;color:#e2e8f0;font-weight:600">No scan results to show</div><div style="margin-top:8px;color:#64748b;font-size:13px">Run <code style="background:#1e293b;padding:2px 6px;border-radius:4px">python3 -m lighthouse.run_scanner</code> to generate hits.</div></div>
  
    <script>
    function applyFilters() {
      const sector = document.getElementById('filter-sector').value;
      const theme = document.getElementById('filter-theme').value;
      const stage2Only = document.getElementById('filter-stage2').checked;
      const newOnly = document.getElementById('filter-new').checked;
      const rows = document.querySelectorAll('details.hit-row');
      let visible = 0, newVisible = 0;
      rows.forEach(row => {
        const rSector = row.dataset.sector || '';
        const rThemes = (row.dataset.themes || '').split(',').filter(t => t.length > 0);
        const rStage2 = row.dataset.stage2 === 'true';
        const rNew = row.dataset.new === 'true';
        let show = true;
        if (sector && rSector !== sector) show = false;
        if (theme && !rThemes.includes(theme)) show = false;
        if (stage2Only && !rStage2) show = false;
        if (newOnly && !rNew) show = false;
        row.style.display = show ? '' : 'none';
        if (show) {
          visible++;
          if (rNew) newVisible++;
        }
      });
      document.getElementById('hit-count').textContent = visible;
      document.getElementById('new-count').textContent = newVisible;
    }
    function resetFilters() {
      document.getElementById('filter-sector').value = '';
      document.getElementById('filter-theme').value = '';
      document.getElementById('filter-stage2').checked = false;
      document.getElementById('filter-new').checked = false;
      applyFilters();
    }
    </script>
    
</body>
</html>
